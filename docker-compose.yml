services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: purchase
      POSTGRES_USER: purchase
      POSTGRES_PASSWORD: purchase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purchase"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://purchase:purchase@db:5432/purchase
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A core worker -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://purchase:purchase@db:5432/purchase
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - db
      - redis

volumes:
  pgdata:
