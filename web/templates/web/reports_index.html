{% extends "web/base.html" %}
{% block title %}Reports{% endblock %}
{% block crumb %}<b>Reports</b>{% endblock %}
{% block content %}
<h4 class="mb-3">Reports</h4>
<div class="row g-3">
  {% for it in items %}
  <div class="col-md-4">
    <a class="card p-3 lift d-block h-100" href="{% url 'web:report_view' it.slug %}">
      <div class="stat"><div class="chip c-indigo"><i class="bi bi-bar-chart"></i></div>
        <div><div class="fw-semibold">{{ it.title }}</div></div></div>
    </a>
  </div>
  {% endfor %}
  <div class="col-md-4">
    <div class="card p-3 h-100">
      <div class="fw-semibold mb-2">Supplier Ledger</div>
      <form method="get" action="{% url 'web:supplier_ledger_report' %}" class="d-flex gap-2">
        <select name="vendor" class="form-select form-select-sm">
          {% for v in vendors %}<option value="{{ v.id }}">{{ v.name }}</option>{% endfor %}
        </select>
        <button class="btn btn-outline-secondary btn-sm">View</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
